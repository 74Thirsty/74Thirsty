<svg width="100%" height="140" viewBox="0 0 800 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <!-- Glow for main text -->
    <filter id="textGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.4
                0 0 0 0 0.8
                0 0 0 0 1
                0 0 0 0.8 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Animated scan line -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.25)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="800" height="140" fill="url(#bgGrad)" rx="12" />

  <!-- Subtle grid lines -->
  <g stroke="#1f2937" stroke-width="0.5" opacity="0.5">
    <line x1="40" y1="20" x2="760" y2="20"/>
    <line x1="40" y1="60" x2="760" y2="60"/>
    <line x1="40" y1="100" x2="760" y2="100"/>
  </g>

  <!-- USB icon (stylized) -->
  <g transform="translate(70,35)" fill="none" stroke="#38bdf8" stroke-width="2">
    <rect x="0" y="20" width="60" height="40" rx="4" fill="rgba(15,23,42,0.8)" />
    <rect x="18" y="0" width="24" height="20" rx="2" fill="#0f172a" />
    <circle cx="18" cy="10" r="2" fill="#38bdf8" />
    <circle cx="42" cy="10" r="2" fill="#38bdf8" />
    <path d="M30 40 L30 10" stroke="#38bdf8" stroke-width="2" />
    <path d="M30 10 L44 4" stroke="#38bdf8" stroke-width="2" />
    <path d="M30 10 L16 4" stroke="#38bdf8" stroke-width="2" />
    <circle cx="44" cy="4" r="3" fill="#38bdf8" />
    <rect x="13" y="1" width="6" height="6" fill="#38bdf8" />
    <!-- Pulsing glow -->
    <circle cx="30" cy="40" r="10" fill="#38bdf8" opacity="0.2">
      <animate attributeName="r" values="10;16;10" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="1.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Main title -->
  <text x="170" y="60"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="34"
        font-weight="700"
        letter-spacing="4"
        fill="#e5e7eb"
        filter="url(#textGlow)">
    LIVE USB
  </text>

  <!-- Subtitle / tagline -->
  <text x="170" y="95"
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16"
        fill="#9ca3af">
    Fast. Clean. Bootable. — I ride for your flash drives.
  </text>

  <!-- Animated scan line -->
  <rect x="40" y="0" width="720" height="140" fill="url(#scanGrad)" opacity="0.0">
    <animate attributeName="y" from="-140" to="140" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.4;0" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- Subtle border glow -->
  <rect x="0.5" y="0.5" width="799" height="139" rx="12"
        fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.35">
    <animate attributeName="opacity" values="0.15;0.5;0.15" dur="2.5s" repeatCount="indefinite"/>
  </rect>
</svg>
