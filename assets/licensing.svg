<svg width="100%" height="300" viewBox="0 0 1400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Licensing Server secure control plane banner">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05070d"></stop>
      <stop offset="45%" stop-color="#0a1020"></stop>
      <stop offset="100%" stop-color="#07141a"></stop>
    </linearGradient>

    <radialGradient id="coreGlow" cx="50%" cy="46%" r="58%">
      <stop offset="0%" stop-color="#00d0ff" stop-opacity="0.22">
        <animate attributeName="stop-opacity" values="0.12;0.30;0.12" dur="6.5s" repeatCount="indefinite"></animate>
      </stop>
      <stop offset="50%" stop-color="#0ff0c8" stop-opacity="0.08"></stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"></stop>
    </radialGradient>

    <linearGradient id="steel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f2fbff"></stop>
      <stop offset="22%" stop-color="#a4c3d7"></stop>
      <stop offset="50%" stop-color="#5d7f95"></stop>
      <stop offset="72%" stop-color="#d7eefb"></stop>
      <stop offset="100%" stop-color="#8aaabd"></stop>
    </linearGradient>

    <linearGradient id="cyanEdge" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6fe7ff"></stop>
      <stop offset="100%" stop-color="#00ffc8"></stop>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f4fcff"></stop>
      <stop offset="45%" stop-color="#b9e8ff"></stop>
      <stop offset="100%" stop-color="#8cefd9"></stop>
    </linearGradient>

    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6fe7ff" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#6fe7ff" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#00ffc8" stop-opacity="0"></stop>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="hardGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="15" result="b1"></feGaussianBlur>
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b2"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="b1"></feMergeNode>
        <feMergeNode in="b2"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <pattern id="microGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#80b8d0" stroke-opacity="0.08" stroke-width="1"></path>
      <circle cx="0" cy="0" r="1" fill="#8edfff" opacity="0.10"></circle>
    </pattern>

    <!-- central shield -->
    <path id="shield" d="M700 52
             L804 88
             L804 148
             Q804 213 700 248
             Q596 213 596 148
             L596 88
             Z"></path>
  </defs>

  <!-- Background -->
  <rect width="1400" height="300" rx="24" fill="url(#bg)"></rect>
  <rect width="1400" height="300" rx="24" fill="url(#microGrid)"></rect>
  <ellipse cx="700" cy="144" rx="420" ry="132" fill="url(#coreGlow)"></ellipse>

  <!-- Outer frame -->
  <rect x="16" y="16" width="1368" height="268" rx="18" fill="none" stroke="url(#steel)" stroke-opacity="0.38" stroke-width="1.8"></rect>
  <rect x="28" y="28" width="1344" height="244" rx="14" fill="none" stroke="#77dfff" stroke-opacity="0.14" stroke-width="1"></rect>

  <!-- Side rails -->
  <path d="M92 76 L92 224 M92 76 L126 76 M92 224 L126 224" stroke="#73e6ff" stroke-width="3" stroke-linecap="round" opacity="0.72" filter="url(#hardGlow)"></path>
  <path d="M1308 76 L1308 224 M1308 76 L1274 76 M1308 224 L1274 224" stroke="#00ffc8" stroke-width="3" stroke-linecap="round" opacity="0.72" filter="url(#hardGlow)"></path>

  <!-- Header strips -->
  <g opacity="0.92">
    <rect x="180" y="54" width="220" height="16" rx="8" fill="#7ce9ff" fill-opacity="0.10"></rect>
    <rect x="1000" y="54" width="220" height="16" rx="8" fill="#00ffc8" fill-opacity="0.10"></rect>
    <rect x="212" y="59" width="146" height="6" rx="3" fill="#7ce9ff" filter="url(#hardGlow)">
      <animate attributeName="width" values="146;92;146" dur="4.2s" repeatCount="indefinite"></animate>
    </rect>
    <rect x="1032" y="59" width="146" height="6" rx="3" fill="#00ffc8" filter="url(#hardGlow)">
      <animate attributeName="width" values="146;106;146" dur="3.8s" repeatCount="indefinite"></animate>
    </rect>
  </g>

  <!-- Central shield glow -->
  <use href="#shield" fill="url(#cyanEdge)" opacity="0.10" filter="url(#bigGlow)"></use>
  <use href="#shield" fill="#08131d"></use>
  <use href="#shield" fill="none" stroke="url(#steel)" stroke-width="4" filter="url(#hardGlow)">
    <animate attributeName="opacity" values="0.72;1;0.72" dur="3.4s" repeatCount="indefinite"></animate>
  </use>
  <path d="M700 70 L786 100 L786 146 Q786 197 700 227 Q614 197 614 146 L614 100 Z" fill="none" stroke="#8deaff" stroke-opacity="0.20" stroke-width="1.4"></path>

  <!-- Lock icon -->
  <g transform="translate(700 136)" filter="url(#hardGlow)">
    <rect x="-34" y="-2" width="68" height="54" rx="12" fill="#0d1d29" stroke="url(#cyanEdge)" stroke-width="2.4"></rect>
    <path d="M-18 -2 V-20 Q-18 -40 0 -40 Q18 -40 18 -20 V-2" fill="none" stroke="#dff8ff" stroke-width="6" stroke-linecap="round"></path>
    <circle cx="0" cy="22" r="8" fill="#9beeff"></circle>
    <rect x="-3.2" y="22" width="6.4" height="14" rx="3.2" fill="#9beeff"></rect>
  </g>

  <!-- Circuit lines -->
  <g stroke-linecap="round" fill="none" filter="url(#softGlow)">
    <path d="M190 210 H520 Q548 210 566 194 L610 156" stroke="url(#lineGrad)" stroke-width="2.4" opacity="0.9"></path>
    <path d="M1210 210 H880 Q852 210 834 194 L790 156" stroke="url(#lineGrad)" stroke-width="2.4" opacity="0.9"></path>
    <path d="M250 238 H540" stroke="url(#lineGrad)" stroke-width="1.4" opacity="0.45"></path>
    <path d="M860 238 H1150" stroke="url(#lineGrad)" stroke-width="1.4" opacity="0.45"></path>
  </g>

  <!-- Data nodes -->
  <g filter="url(#hardGlow)">
    <circle cx="250" cy="238" r="4" fill="#77e7ff"></circle>
    <circle cx="540" cy="238" r="4" fill="#77e7ff"></circle>
    <circle cx="1150" cy="238" r="4" fill="#00ffc8"></circle>
    <circle cx="860" cy="238" r="4" fill="#00ffc8"></circle>
    <circle cx="610" cy="156" r="4" fill="#9beeff"></circle>
    <circle cx="790" cy="156" r="4" fill="#9beeff"></circle>
  </g>

  <!-- Side labels -->
  <g font-family="JetBrains Mono, 'Roboto Mono', monospace" font-size="13" letter-spacing="2" opacity="0.72">
    <text x="154" y="112" fill="#8bdfff">ACTIVATE</text>
    <text x="154" y="136" fill="#8bdfff">VALIDATE</text>
    <text x="154" y="160" fill="#8bdfff">AUDIT</text>

    <text x="1142" y="112" fill="#87ffdf" text-anchor="end">OFFLINE TOKENS</text>
    <text x="1142" y="136" fill="#87ffdf" text-anchor="end">ADMIN API</text>
    <text x="1142" y="160" fill="#87ffdf" text-anchor="end">RATE LIMIT</text>
  </g>

  <!-- Title -->
  <text x="50%" y="82%" text-anchor="middle" font-size="56" font-family="Orbitron, 'Segoe UI', sans-serif" font-weight="800" letter-spacing="4" fill="url(#titleGrad)" filter="url(#softGlow)">
    LICENSING SERVER
  </text>

  <!-- Subtitle -->
  <text x="50%" y="91%" text-anchor="middle" font-size="15" font-family="Inter, 'Segoe UI', sans-serif" letter-spacing="3" fill="#a8dfff" opacity="0.90">
    UNIVERSAL LICENSING • ACTIVATION • VALIDATION • ED25519 OFFLINE TOKENS
  </text>
</svg>