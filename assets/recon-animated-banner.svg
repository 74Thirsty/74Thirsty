<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Recon Animated SVG Banner</title>
  <desc id="desc">Animated cyber reconnaissance banner for 74Thirsty/recon, featuring scanning grid, radar sweep, packets, and terminal text.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070b"/>
      <stop offset="48%" stop-color="#08151f"/>
      <stop offset="100%" stop-color="#020305"/>
    </linearGradient>

    <radialGradient id="radarGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#00ff9c" stop-opacity="0.55"/>
      <stop offset="42%" stop-color="#00e5ff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#00ff9c" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff9c" stop-opacity="0"/>
      <stop offset="70%" stop-color="#00ff9c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00ff9c" stop-opacity="0.75"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#00e5ff" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>

    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace; }
      .scanline { animation: scan 4.5s linear infinite; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: 185px 180px; }
      .packet { animation: packet 5s linear infinite; }
      .packet2 { animation-delay: -1.7s; }
      .packet3 { animation-delay: -3.1s; }
      .blink { animation: blink 1.05s steps(2,end) infinite; }
      .dash { stroke-dasharray: 12 18; animation: dash 2.8s linear infinite; }
      .sweep { animation: sweepRotate 4s linear infinite; transform-origin: 185px 180px; }
      .type1 { animation: show1 9s steps(1,end) infinite; }
      .type2 { animation: show2 9s steps(1,end) infinite; }
      .type3 { animation: show3 9s steps(1,end) infinite; }
      .float { animation: float 3.5s ease-in-out infinite; }

      @keyframes scan { from { transform: translateY(-360px); } to { transform: translateY(360px); } }
      @keyframes pulse { 0%,100% { transform: scale(1); opacity: .72; } 50% { transform: scale(1.08); opacity: 1; } }
      @keyframes packet { from { transform: translateX(-90px); opacity: 0; } 12% { opacity: 1; } 82% { opacity: 1; } to { transform: translateX(1260px); opacity: 0; } }
      @keyframes blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
      @keyframes dash { to { stroke-dashoffset: -60; } }
      @keyframes sweepRotate { to { transform: rotate(360deg); } }
      @keyframes show1 { 0%,32% { opacity: 1; } 33%,100% { opacity: 0; } }
      @keyframes show2 { 0%,32% { opacity: 0; } 33%,65% { opacity: 1; } 66%,100% { opacity: 0; } }
      @keyframes show3 { 0%,65% { opacity: 0; } 66%,100% { opacity: 1; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    </style>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)" opacity="0.9"/>

  <g opacity="0.35">
    <path class="dash" d="M0 282 C190 235 265 330 440 266 S805 214 1200 265" fill="none" stroke="#00e5ff" stroke-width="2"/>
    <path class="dash" d="M0 84 C250 150 310 46 510 92 S865 142 1200 70" fill="none" stroke="#00ff9c" stroke-width="2" opacity="0.65"/>
  </g>

  <g class="packet" filter="url(#glow)">
    <rect x="0" y="74" width="54" height="18" rx="9" fill="#00ff9c" opacity="0.85"/>
    <text x="12" y="87" class="mono" font-size="10" fill="#00140d">SYN</text>
  </g>
  <g class="packet packet2" filter="url(#glow)">
    <rect x="0" y="262" width="68" height="18" rx="9" fill="#00e5ff" opacity="0.8"/>
    <text x="12" y="275" class="mono" font-size="10" fill="#001018">PCAP</text>
  </g>
  <g class="packet packet3" filter="url(#glow)">
    <rect x="0" y="128" width="58" height="18" rx="9" fill="#d6ff00" opacity="0.75"/>
    <text x="11" y="141" class="mono" font-size="10" fill="#111400">DNS</text>
  </g>

  <g transform="translate(0,0)" class="float">
    <circle cx="185" cy="180" r="126" fill="url(#radarGlow)"/>
    <circle cx="185" cy="180" r="112" fill="none" stroke="#00ff9c" stroke-opacity="0.6" stroke-width="2"/>
    <circle cx="185" cy="180" r="76" fill="none" stroke="#00e5ff" stroke-opacity="0.34" stroke-width="2"/>
    <circle cx="185" cy="180" r="38" fill="none" stroke="#00ff9c" stroke-opacity="0.28" stroke-width="2"/>
    <path d="M185 180 L185 68" stroke="#00ff9c" stroke-opacity="0.55" stroke-width="2"/>
    <path d="M73 180 L297 180" stroke="#00e5ff" stroke-opacity="0.25" stroke-width="2"/>
    <path class="sweep" d="M185 180 L185 67 A113 113 0 0 1 282 124 Z" fill="url(#sweep)"/>
    <circle class="pulse" cx="244" cy="132" r="5" fill="#d6ff00" filter="url(#glow)"/>
    <circle class="pulse" cx="132" cy="224" r="4" fill="#00e5ff" filter="url(#glow)" style="animation-delay:-.8s"/>
    <circle class="pulse" cx="203" cy="247" r="4" fill="#00ff9c" filter="url(#glow)" style="animation-delay:-1.4s"/>
  </g>

  <g filter="url(#glow)">
    <text x="350" y="126" class="mono" font-size="76" font-weight="900" fill="#f4fff9" letter-spacing="6">RECON</text>
    <text x="356" y="126" class="mono" font-size="76" font-weight="900" fill="#00e5ff" letter-spacing="6" opacity="0.18">RECON</text>
    <text x="354" y="158" class="mono" font-size="22" fill="#00ff9c" letter-spacing="3">OSINT • NMAP • DNS • PCAP • WEB FINGERPRINTING</text>
  </g>

  <g transform="translate(354 196)">
    <rect width="674" height="98" rx="14" fill="#02060a" stroke="#00e5ff" stroke-opacity="0.34"/>
    <circle cx="23" cy="24" r="5" fill="#ff5f56"/>
    <circle cx="42" cy="24" r="5" fill="#ffbd2e"/>
    <circle cx="61" cy="24" r="5" fill="#27c93f"/>
    <text x="22" y="61" class="mono type1" font-size="22" fill="#d9fff0">$ ./recon.sh --profile target</text>
    <text x="22" y="61" class="mono type2" font-size="22" fill="#d9fff0">$ nmap -sV --scripts vuln</text>
    <text x="22" y="61" class="mono type3" font-size="22" fill="#d9fff0">$ tshark -i wlan0 -w reports/capture.pcap</text>
    <rect class="blink" x="520" y="43" width="13" height="24" fill="#00ff9c" opacity="0.9"/>
  </g>

  <g class="scanline" opacity="0.22">
    <rect x="0" y="0" width="1200" height="46" fill="#00ff9c"/>
  </g>

  <text x="1018" y="323" class="mono" font-size="16" fill="#00e5ff" opacity="0.8">74Thirsty/recon</text>
</svg>
