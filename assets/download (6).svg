<svg width="100%" height="100%" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#00cfff"></stop>
      <stop offset="100%" stop-color="#0077ff"></stop>
    </linearGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="coloredBlur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent background -->

  <!-- Clean outline frame -->
  <rect x="20" y="50" width="760" height="100" rx="20" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.6"></rect>

  <!-- Animated scan line -->
  <rect x="20" y="50" width="120" height="100" fill="url(#glow)" opacity="0.15">
    <animate attributeName="x" from="20" to="660" dur="2s" repeatCount="indefinite"></animate>
  </rect>

  <!-- Title -->
  <text x="50%" y="95" dominant-baseline="middle" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#ffffff" filter="url(#softGlow)">
    Hirschauers
  </text>

  <!-- Subtitle -->
  <text x="50%" y="125" dominant-baseline="middle" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#00cfff">
    Self-Calibrating Gas Model
  </text>

  <!-- Pulse dots -->
  <circle cx="100" cy="150" r="5" fill="#00cfff">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"></animate>
  </circle>

  <circle cx="130" cy="150" r="5" fill="#00cfff">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"></animate>
  </circle>

  <circle cx="160" cy="150" r="5" fill="#00cfff">
    <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.6s" repeatCount="indefinite"></animate>
  </circle>

</svg>