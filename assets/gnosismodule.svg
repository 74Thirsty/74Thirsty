<svg width="100%" height="100%" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="laser" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"></stop>
      <stop offset="50%" stop-color="#4f8cff"></stop>
      <stop offset="100%" stop-color="#8b5cf6"></stop>
    </linearGradient>

    <filter id="laserGlow">
      <feGaussianBlur stdDeviation="2.5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <!-- perimeter path -->
    <path id="outlinePath" d="M40 40 
             H1160 
             Q1180 40 1180 60 
             V200 
             Q1180 220 1160 220 
             H40 
             Q20 220 20 200 
             V60 
             Q20 40 40 40 Z"></path>
  </defs>

  <!-- transparent background -->

  <!-- FAST laser tracer -->
  <use href="#outlinePath" fill="none" stroke="url(#laser)" stroke-width="3" stroke-linecap="round" stroke-dasharray="80 900" filter="url(#laserGlow)">
    <animate attributeName="stroke-dashoffset" from="0" to="-980" dur="1.1s" repeatCount="indefinite"></animate>
  </use>

  <!-- subtle trailing glow -->
  <use href="#outlinePath" fill="none" stroke="#00e5ff" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="40 1000">
    <animate attributeName="stroke-dashoffset" from="0" to="-980" dur="1.1s" repeatCount="indefinite"></animate>
  </use>

  <!-- title -->
  <text x="70" y="120" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#ffffff" filter="url(#laserGlow)">
    Gnosis Safe
  </text>

  <text x="70" y="160" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#8fdcff">
    Integration
  </text>

  <!-- center core -->
  <g transform="translate(720 130)">
    <circle r="48" fill="none" stroke="#00e5ff" stroke-opacity="0.25" stroke-width="8">
      <animate attributeName="r" values="44;48;44" dur="1.8s" repeatCount="indefinite"></animate>
    </circle>

    <rect x="-24" y="-24" width="48" height="48" rx="10" fill="none" stroke="#d9fbff" stroke-width="2" filter="url(#laserGlow)"></rect>

    <circle r="5" fill="#ffffff" filter="url(#laserGlow)"></circle>
  </g>

  <!-- fast data streaks -->
  <g stroke="url(#laser)" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="520" y1="80" x2="680" y2="130">
      <animate attributeName="stroke-dasharray" values="0 200;40 160;0 200" dur="0.8s" repeatCount="indefinite"></animate>
    </line>

    <line x1="520" y1="180" x2="680" y2="130">
      <animate attributeName="stroke-dasharray" values="0 200;40 160;0 200" dur="0.9s" repeatCount="indefinite"></animate>
    </line>
  </g>

</svg>