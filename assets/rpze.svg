<svg width="100%" height="100%" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="zoneStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5d4"></stop>
      <stop offset="50%" stop-color="#00bbff"></stop>
      <stop offset="100%" stop-color="#7c4dff"></stop>
    </linearGradient>

    <linearGradient id="pulseFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5d4" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#00bbff" stop-opacity="0.18"></stop>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"></stop>
    </linearGradient>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="tinyGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="1.2" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <clipPath id="mainClip">
      <rect x="22" y="22" width="1156" height="236" rx="28"></rect>
    </clipPath>

    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M 28 0 L 0 0 0 28" fill="none" stroke="#57dfff" stroke-opacity="0.12" stroke-width="1"></path>
    </pattern>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dfffff" stop-opacity="0.95"></stop>
      <stop offset="35%" stop-color="#00f5d4" stop-opacity="0.65"></stop>
      <stop offset="70%" stop-color="#00bbff" stop-opacity="0.18"></stop>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"></stop>
    </radialGradient>
  </defs>

  <!-- transparent background -->

  <!-- outer frame -->
  <rect x="22" y="22" width="1156" height="236" rx="28" fill="none" stroke="url(#zoneStroke)" stroke-opacity="0.55" stroke-width="2"></rect>

  <!-- background tech grid -->
  <g clip-path="url(#mainClip)">
    <rect x="22" y="22" width="1156" height="236" fill="url(#grid)"></rect>
  </g>

  <!-- sweeping field energy -->
  <g clip-path="url(#mainClip)">
    <rect x="-240" y="0" width="300" height="320" fill="url(#pulseFill)" transform="rotate(-8 0 0)">
      <animate attributeName="x" from="-260" to="1320" dur="5.4s" repeatCount="indefinite"></animate>
    </rect>
  </g>

  <!-- left title cluster -->
  <text x="70" y="80" font-family="Arial, Helvetica, sans-serif" font-size="13" letter-spacing="3" fill="#8ff7ea" opacity="0.88">
    EXPANSION PROTOCOL
  </text>

  <text x="70" y="128" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" fill="#ffffff" filter="url(#softGlow)">
    RPZE
  </text>

  <text x="70" y="165" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#8edfff">
    Reactive Profitable Zone Expansion
  </text>

  <text x="70" y="204" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#abf7ff" opacity="0.92">
    Detecting edge density • Expanding profitable regions • Repositioning frontier
  </text>

  <!-- status chips -->
  <g transform="translate(68 218)">
    <rect x="0" y="0" width="144" height="24" rx="12" fill="none" stroke="#00f5d4" stroke-opacity="0.35"></rect>
    <circle cx="16" cy="12" r="4" fill="#00f5d4" filter="url(#tinyGlow)">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.2s" repeatCount="indefinite"></animate>
    </circle>
    <text x="28" y="16" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#d7ffff">Zone Growth Active</text>
  </g>

  <g transform="translate(222 218)">
    <rect x="0" y="0" width="138" height="24" rx="12" fill="none" stroke="#00bbff" stroke-opacity="0.35"></rect>
    <circle cx="16" cy="12" r="4" fill="#00bbff" filter="url(#tinyGlow)">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.2s" begin="0.2s" repeatCount="indefinite"></animate>
    </circle>
    <text x="28" y="16" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#d7ffff">Reactive Shift</text>
  </g>

  <g transform="translate(370 218)">
    <rect x="0" y="0" width="132" height="24" rx="12" fill="none" stroke="#7c4dff" stroke-opacity="0.35"></rect>
    <circle cx="16" cy="12" r="4" fill="#7c4dff" filter="url(#tinyGlow)">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.2s" begin="0.4s" repeatCount="indefinite"></animate>
    </circle>
    <text x="28" y="16" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#d7ffff">Edge Locked</text>
  </g>

  <!-- central-right zone map system -->
  <g transform="translate(770 140)">
    <!-- glow cloud -->
    <circle cx="0" cy="0" r="94" fill="url(#coreGlow)" opacity="0.95"></circle>

    <!-- expanding zone rings -->
    <circle cx="0" cy="0" r="26" fill="none" stroke="#00f5d4" stroke-width="2.2" stroke-opacity="0.85" filter="url(#softGlow)">
      <animate attributeName="r" values="22;28;22" dur="2.2s" repeatCount="indefinite"></animate>
    </circle>

    <circle cx="0" cy="0" r="48" fill="none" stroke="#00bbff" stroke-width="1.8" stroke-opacity="0.45" stroke-dasharray="4 7">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"></animateTransform>
    </circle>

    <circle cx="0" cy="0" r="72" fill="none" stroke="#7c4dff" stroke-width="1.6" stroke-opacity="0.35" stroke-dasharray="2 9">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="12s" repeatCount="indefinite"></animateTransform>
    </circle>

    <!-- expanding frontier pulses -->
    <circle cx="0" cy="0" r="18" fill="none" stroke="#d8ffff" stroke-width="1.6" opacity="0">
      <animate attributeName="r" values="18;92" dur="2.8s" repeatCount="indefinite"></animate>
      <animate attributeName="opacity" values="0.7;0" dur="2.8s" repeatCount="indefinite"></animate>
    </circle>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#8ef8ff" stroke-width="1.4" opacity="0">
      <animate attributeName="r" values="18;92" dur="2.8s" begin="1.4s" repeatCount="indefinite"></animate>
      <animate attributeName="opacity" values="0.55;0" dur="2.8s" begin="1.4s" repeatCount="indefinite"></animate>
    </circle>

    <!-- core -->
    <circle cx="0" cy="0" r="10" fill="#ffffff" filter="url(#softGlow)"></circle>
    <circle cx="0" cy="0" r="5" fill="#00f5d4"></circle>

    <!-- reactive target nodes -->
    <g>
      <circle cx="-112" cy="-38" r="7" fill="none" stroke="#00f5d4" stroke-width="2"></circle>
      <circle cx="96" cy="-54" r="7" fill="none" stroke="#00bbff" stroke-width="2"></circle>
      <circle cx="120" cy="20" r="7" fill="none" stroke="#7c4dff" stroke-width="2"></circle>
      <circle cx="58" cy="82" r="7" fill="none" stroke="#00f5d4" stroke-width="2"></circle>
      <circle cx="-86" cy="74" r="7" fill="none" stroke="#00bbff" stroke-width="2"></circle>
      <circle cx="-132" cy="10" r="7" fill="none" stroke="#7c4dff" stroke-width="2"></circle>
    </g>

    <!-- node fills -->
    <g filter="url(#tinyGlow)">
      <circle cx="-112" cy="-38" r="2.8" fill="#00f5d4">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"></animate>
      </circle>
      <circle cx="96" cy="-54" r="2.8" fill="#00bbff">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" begin="0.2s" repeatCount="indefinite"></animate>
      </circle>
      <circle cx="120" cy="20" r="2.8" fill="#7c4dff">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" begin="0.4s" repeatCount="indefinite"></animate>
      </circle>
      <circle cx="58" cy="82" r="2.8" fill="#00f5d4">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" begin="0.6s" repeatCount="indefinite"></animate>
      </circle>
      <circle cx="-86" cy="74" r="2.8" fill="#00bbff">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" begin="0.8s" repeatCount="indefinite"></animate>
      </circle>
      <circle cx="-132" cy="10" r="2.8" fill="#7c4dff">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" begin="1s" repeatCount="indefinite"></animate>
      </circle>
    </g>

    <!-- triangular route mesh -->
    <g fill="none" stroke="url(#zoneStroke)" stroke-opacity="0.34" stroke-width="1.4">
      <path d="M-112 -38 L0 0 L96 -54 L120 20 L58 82 L-86 74 L-132 10 Z"></path>
      <path d="M-112 -38 L58 82"></path>
      <path d="M96 -54 L-86 74"></path>
      <path d="M120 20 L-132 10"></path>
    </g>

    <!-- moving packets -->
    <g filter="url(#tinyGlow)">
      <circle r="3" fill="#ffffff">
        <animateMotion dur="2.0s" repeatCount="indefinite" path="M-112 -38 L0 0 L96 -54"></animateMotion>
      </circle>
      <circle r="3" fill="#aefcff">
        <animateMotion dur="2.4s" begin="0.4s" repeatCount="indefinite" path="M120 20 L58 82 L-86 74"></animateMotion>
      </circle>
      <circle r="3" fill="#ffffff">
        <animateMotion dur="2.1s" begin="0.7s" repeatCount="indefinite" path="M-132 10 L0 0 L120 20"></animateMotion>
      </circle>
    </g>
  </g>

  <!-- right analytics rail -->
  <g transform="translate(980 52)">
    <rect x="0" y="0" width="154" height="176" rx="18" fill="none" stroke="#8adfff" stroke-opacity="0.24"></rect>

    <text x="18" y="24" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="1.6" fill="#95f5ff">
      ZONE TELEMETRY
    </text>

    <text x="18" y="54" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#d9ffff">Expansion</text>
    <rect x="86" y="45" width="48" height="10" rx="5" fill="#132533" opacity="0.45"></rect>
    <rect x="86" y="45" width="36" height="10" rx="5" fill="#00f5d4" opacity="0.85">
      <animate attributeName="width" values="20;36;28;36" dur="2.1s" repeatCount="indefinite"></animate>
    </rect>

    <text x="18" y="84" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#d9ffff">Density</text>
    <rect x="86" y="75" width="48" height="10" rx="5" fill="#132533" opacity="0.45"></rect>
    <rect x="86" y="75" width="42" height="10" rx="5" fill="#00bbff" opacity="0.82">
      <animate attributeName="width" values="24;42;31;42" dur="2.7s" repeatCount="indefinite"></animate>
    </rect>

    <text x="18" y="114" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#d9ffff">Reactivity</text>
    <rect x="86" y="105" width="48" height="10" rx="5" fill="#132533" opacity="0.45"></rect>
    <rect x="86" y="105" width="30" height="10" rx="5" fill="#7c4dff" opacity="0.82">
      <animate attributeName="width" values="18;30;25;30" dur="2.3s" repeatCount="indefinite"></animate>
    </rect>

    <text x="18" y="145" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#d9ffff">Profit Radius</text>
    <text x="96" y="145" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8ff7ea">
      +18.4%
    </text>

    <text x="18" y="171" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#d9ffff">State</text>
    <circle cx="97" cy="167" r="5" fill="#00ffb3" filter="url(#tinyGlow)">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.2s" repeatCount="indefinite"></animate>
    </circle>
    <text x="108" y="171" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#b8fff1">
      ACTIVE
    </text>
  </g>

  <!-- bottom reactive waveform strip -->
  <g transform="translate(600 224)">
    <text x="-2" y="-10" font-family="Arial, Helvetica, sans-serif" font-size="10" letter-spacing="1.4" fill="#9efbff" opacity="0.85">
      REACTIVE PROFIT FRONTIER
    </text>

    <path d="M0 0
             C20 -8, 36 -8, 54 0
             C72 8, 88 8, 106 0
             C124 -10, 144 -10, 162 0
             C180 10, 202 10, 220 0
             C238 -12, 260 -12, 278 0
             C296 10, 318 10, 336 0" fill="none" stroke="#8ef7ff" stroke-width="2" stroke-linecap="round" filter="url(#tinyGlow)">
      <animateTransform attributeName="transform" type="translate" values="0 0; 5 0; -3 0; 0 0" dur="2.4s" repeatCount="indefinite"></animateTransform>
    </path>
  </g>
</svg>
