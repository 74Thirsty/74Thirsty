<svg width="100%" height="100%" viewBox="0 0 960 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e0ff"></stop>
      <stop offset="50%" stop-color="#4d9dff"></stop>
      <stop offset="100%" stop-color="#7b61ff"></stop>
    </linearGradient>

    <linearGradient id="scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e0ff" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#00e0ff" stop-opacity="0.22"></stop>
      <stop offset="100%" stop-color="#00e0ff" stop-opacity="0"></stop>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <clipPath id="tickerClip">
      <rect x="36" y="34" width="888" height="30" rx="8"></rect>
    </clipPath>

    <clipPath id="waveClip">
      <rect x="565" y="88" width="320" height="88" rx="10"></rect>
    </clipPath>
  </defs>

  <!-- transparent background -->

  <!-- outer frame -->
  <rect x="20" y="20" width="920" height="200" rx="24" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.75"></rect>

  <!-- animated scan sweep -->
  <rect x="-180" y="20" width="180" height="200" fill="url(#scan)">
    <animate attributeName="x" from="-180" to="980" dur="2.8s" repeatCount="indefinite"></animate>
  </rect>

  <!-- ticker shell -->
  <rect x="36" y="34" width="888" height="30" rx="8" fill="none" stroke="#6fdcff" stroke-opacity="0.30" stroke-width="1"></rect>

  <!-- scrolling top ticker -->
  <g clip-path="url(#tickerClip)">
    <text x="924" y="54" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#9beaff" filter="url(#softGlow)">
      Safe Threshold Synced • Multisig Ready • Pending Owners Verified • Execution Path Valid • Gnosis Safe Integration Active • Safe Threshold Synced •
      <animate attributeName="x" from="924" to="-760" dur="14s" repeatCount="indefinite"></animate>
    </text>
  </g>

  <!-- title -->
  <text x="56" y="110" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#ffffff" filter="url(#softGlow)">
    Gnosis Safe
  </text>

  <text x="56" y="144" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#7fdcff">
    Integration
  </text>

  <!-- left metadata -->
  <text x="56" y="178" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8fdfff" opacity="0.92">
    Threshold: 3/5
  </text>

  <text x="158" y="178" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8fdfff" opacity="0.92">
    Owners Verified
  </text>

  <text x="286" y="178" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8fdfff" opacity="0.92">
    Execution Ready
  </text>

  <!-- status dots -->
  <circle cx="455" cy="174" r="4" fill="#00e0ff" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="474" cy="174" r="4" fill="#4d9dff" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" begin="0.2s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="493" cy="174" r="4" fill="#7b61ff" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="1.2s" begin="0.4s" repeatCount="indefinite"></animate>
  </circle>

  <!-- waveform panel -->
  <rect x="565" y="88" width="320" height="88" rx="10" fill="none" stroke="#74dfff" stroke-opacity="0.28" stroke-width="1"></rect>

  <!-- grid -->
  <g opacity="0.16">
    <line x1="565" y1="110" x2="885" y2="110" stroke="#74dfff"></line>
    <line x1="565" y1="132" x2="885" y2="132" stroke="#74dfff"></line>
    <line x1="565" y1="154" x2="885" y2="154" stroke="#74dfff"></line>
    <line x1="605" y1="88" x2="605" y2="176" stroke="#74dfff"></line>
    <line x1="645" y1="88" x2="645" y2="176" stroke="#74dfff"></line>
    <line x1="685" y1="88" x2="685" y2="176" stroke="#74dfff"></line>
    <line x1="725" y1="88" x2="725" y2="176" stroke="#74dfff"></line>
    <line x1="765" y1="88" x2="765" y2="176" stroke="#74dfff"></line>
    <line x1="805" y1="88" x2="805" y2="176" stroke="#74dfff"></line>
    <line x1="845" y1="88" x2="845" y2="176" stroke="#74dfff"></line>
  </g>

  <!-- animated signature/wave line -->
  <g clip-path="url(#waveClip)">
    <path d="M565 136
             C580 136, 590 104, 605 104
             C620 104, 630 160, 645 160
             C660 160, 670 118, 685 118
             C700 118, 710 146, 725 146
             C740 146, 750 96, 765 96
             C780 96, 790 132, 805 132
             C820 132, 830 120, 845 120
             C860 120, 872 136, 885 136" fill="none" stroke="#00e0ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
      <animateTransform attributeName="transform" type="translate" values="0 0; -10 0; 8 0; 0 0" dur="2.4s" repeatCount="indefinite"></animateTransform>
    </path>

    <path d="M565 136
             C580 136, 590 104, 605 104
             C620 104, 630 160, 645 160
             C660 160, 670 118, 685 118
             C700 118, 710 146, 725 146
             C740 146, 750 96, 765 96
             C780 96, 790 132, 805 132
             C820 132, 830 120, 845 120
             C860 120, 872 136, 885 136" fill="none" stroke="#d5f7ff" stroke-opacity="0.35" stroke-width="1.2">
      <animateTransform attributeName="transform" type="translate" values="0 1; -6 -1; 5 1; 0 1" dur="1.9s" repeatCount="indefinite"></animateTransform>
    </path>
  </g>

  <!-- panel label -->
  <text x="565" y="79" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="1.4" fill="#8fdfff" opacity="0.9">
    MULTISIG EXECUTION SIGNAL
  </text>

  <!-- right-side secure node blocks -->
  <g transform="translate(892 102)">
    <rect x="-10" y="-10" width="10" height="10" rx="2" fill="#00e0ff" opacity="0.85">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="1.4s" repeatCount="indefinite"></animate>
    </rect>
    <rect x="-10" y="6" width="10" height="10" rx="2" fill="#4d9dff" opacity="0.75">
      </rect></g></svg>