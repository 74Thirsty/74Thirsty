<svg width="100%" height="100%" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00cfff"></stop>
      <stop offset="100%" stop-color="#0077ff"></stop>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <clipPath id="tickerClip">
      <rect x="35" y="36" width="830" height="28" rx="8"></rect>
    </clipPath>

    <clipPath id="waveClip">
      <rect x="470" y="86" width="360" height="78" rx="10"></rect>
    </clipPath>
  </defs>

  <!-- transparent background -->

  <!-- outer frame -->
  <rect x="20" y="20" width="860" height="180" rx="22" fill="none" stroke="url(#glow)" stroke-width="2" opacity="0.7"></rect>

  <!-- scan line -->
  <rect x="20" y="20" width="120" height="180" fill="url(#glow)" opacity="0.08">
    <animate attributeName="x" from="20" to="760" dur="2.4s" repeatCount="indefinite"></animate>
  </rect>

  <!-- top ticker shell -->
  <rect x="35" y="36" width="830" height="28" rx="8" fill="none" stroke="#00cfff" stroke-opacity="0.35" stroke-width="1"></rect>

  <!-- scrolling ticker -->
  <g clip-path="url(#tickerClip)">
    <g font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#8fe9ff" filter="url(#softGlow)">
      <text x="865" y="54">
        Gas Drift: -0.0021   •   Auto-Adjusting…   •   Gas Drift: -0.0018   •   Sampling state…   •   Calibration stable   •   Auto-Adjusting…
        <animate attributeName="x" from="865" to="-720" dur="14s" repeatCount="indefinite"></animate>
      </text>
    </g>
  </g>

  <!-- main title -->
  <text x="55" y="112" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#ffffff" filter="url(#softGlow)">
    Hirschauers
  </text>

  <text x="55" y="142" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#00cfff">
    Self-Calibrating Gas Model
  </text>

  <!-- left-side small metrics -->
  <text x="55" y="172" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#7fdfff" opacity="0.9">
    Gas Drift: -0.0021
  </text>

  <text x="205" y="172" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#7fdfff" opacity="0.9">
    Auto-Adjusting…
  </text>

  <!-- pulse dots -->
  <circle cx="380" cy="168" r="4" fill="#00cfff" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="398" cy="168" r="4" fill="#00cfff" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.2s" repeatCount="indefinite"></animate>
  </circle>
  <circle cx="416" cy="168" r="4" fill="#00cfff" filter="url(#softGlow)">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.4s" repeatCount="indefinite"></animate>
  </circle>

  <!-- waveform panel -->
  <rect x="470" y="86" width="360" height="78" rx="10" fill="none" stroke="#00cfff" stroke-opacity="0.30" stroke-width="1"></rect>

  <!-- subtle grid -->
  <g opacity="0.18">
    <line x1="470" y1="105" x2="830" y2="105" stroke="#00cfff" stroke-width="1"></line>
    <line x1="470" y1="125" x2="830" y2="125" stroke="#00cfff" stroke-width="1"></line>
    <line x1="470" y1="145" x2="830" y2="145" stroke="#00cfff" stroke-width="1"></line>
    <line x1="515" y1="86" x2="515" y2="164" stroke="#00cfff" stroke-width="1"></line>
    <line x1="560" y1="86" x2="560" y2="164" stroke="#00cfff" stroke-width="1"></line>
    <line x1="605" y1="86" x2="605" y2="164" stroke="#00cfff" stroke-width="1"></line>
    <line x1="650" y1="86" x2="650" y2="164" stroke="#00cfff" stroke-width="1"></line>
    <line x1="695" y1="86" x2="695" y2="164" stroke="#00cfff" stroke-width="1"></line>
    <line x1="740" y1="86" x2="740" y2="164" stroke="#00cfff" stroke-width="1"></line>
    <line x1="785" y1="86" x2="785" y2="164" stroke="#00cfff" stroke-width="1"></line>
  </g>

  <!-- animated waveform -->
  <g clip-path="url(#waveClip)">
    <g>
      <path d="M 470 126
               C 490 126, 500 100, 520 100
               C 540 100, 545 146, 565 146
               C 585 146, 590 110, 610 110
               C 630 110, 635 138, 655 138
               C 675 138, 680 96, 700 96
               C 720 96, 725 130, 745 130
               C 765 130, 770 118, 790 118
               C 810 118, 820 126, 830 126" fill="none" stroke="#00cfff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)">
        <animateTransform attributeName="transform" type="translate" values="0 0; -18 0; 0 0; 14 0; 0 0" dur="2.8s" repeatCount="indefinite"></animateTransform>
      </path>

      <path d="M 470 126
               C 490 126, 500 100, 520 100
               C 540 100, 545 146, 565 146
               C 585 146, 590 110, 610 110
               C 630 110, 635 138, 655 138
               C 675 138, 680 96, 700 96
               C 720 96, 725 130, 745 130
               C 765 130, 770 118, 790 118
               C 810 118, 820 126, 830 126" fill="none" stroke="#b8f7ff" stroke-opacity="0.35" stroke-width="1.2">
        <animateTransform attributeName="transform" type="translate" values="0 1; -12 -1; 0 1; 10 -1; 0 1" dur="2.2s" repeatCount="indefinite"></animateTransform>
      </path>
    </g>
  </g>

  <!-- waveform label -->
  <text x="470" y="78" font-family="Arial, Helvetica, sans-serif" font-size="11" letter-spacing="1.2" fill="#7fdfff" opacity="0.9">
    REAL-TIME GAS FLUCTUATION
  </text>
</svg>
