<svg width="100%" height="300" viewBox="0 0 1400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Destiny Engine PWA cosmic banner">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#070814"></stop>
      <stop offset="45%" stop-color="#11142a"></stop>
      <stop offset="100%" stop-color="#1a1026"></stop>
    </linearGradient>

    <radialGradient id="nebula" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#5c2d91" stop-opacity="0.34">
        <animate attributeName="stop-opacity" values="0.18;0.38;0.18" dur="7s" repeatCount="indefinite"></animate>
      </stop>
      <stop offset="55%" stop-color="#2a4fbf" stop-opacity="0.14"></stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"></stop>
    </radialGradient>

    <radialGradient id="goldCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3c4" stop-opacity="0.95"></stop>
      <stop offset="35%" stop-color="#ffd86b" stop-opacity="0.75"></stop>
      <stop offset="70%" stop-color="#b8841d" stop-opacity="0.35"></stop>
      <stop offset="100%" stop-color="#b8841d" stop-opacity="0"></stop>
    </radialGradient>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8e9b3"></stop>
      <stop offset="50%" stop-color="#ffd15c"></stop>
      <stop offset="100%" stop-color="#f7c44a"></stop>
    </linearGradient>

    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9bc6ff"></stop>
      <stop offset="100%" stop-color="#d6b0ff"></stop>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14" result="blur1"></feGaussianBlur>
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2"></feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur1"></feMergeNode>
        <feMergeNode in="blur2"></feMergeNode>
        <feMergeNode in="SourceGraphic"></feMergeNode>
      </feMerge>
    </filter>

    <pattern id="starGrid" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="5" r="0.7" fill="#cfd8ff" opacity="0.25"></circle>
      <circle cx="22" cy="14" r="0.9" fill="#fff1c9" opacity="0.22"></circle>
      <circle cx="31" cy="30" r="0.8" fill="#b6caff" opacity="0.18"></circle>
    </pattern>

    <path id="arc1" d="M 180 218 Q 700 78 1220 218" fill="none"></path>
    <path id="arc2" d="M 210 236 Q 700 122 1190 236" fill="none"></path>

    <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7bb3ff" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#ffd96c" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#d39cff" stop-opacity="0"></stop>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1400" height="300" rx="24" fill="url(#bg)"></rect>
  <rect width="1400" height="300" rx="24" fill="url(#starGrid)"></rect>
  <ellipse cx="700" cy="144" rx="430" ry="140" fill="url(#nebula)"></ellipse>

  <!-- Frame -->
  <rect x="16" y="16" width="1368" height="268" rx="18" fill="none" stroke="#b59644" stroke-opacity="0.38" stroke-width="1.6"></rect>
  <rect x="28" y="28" width="1344" height="244" rx="14" fill="none" stroke="#7f91c8" stroke-opacity="0.18" stroke-width="1"></rect>

  <!-- Sacred arcs -->
  <path d="M 180 218 Q 700 78 1220 218" stroke="url(#arcGrad)" stroke-width="2.6" fill="none" stroke-linecap="round" opacity="0.85" filter="url(#softGlow)">
    <animate attributeName="stroke-dasharray" values="0,2200;2200,0" dur="10s" repeatCount="indefinite"></animate>
  </path>
  <path d="M 210 236 Q 700 122 1190 236" stroke="url(#arcGrad)" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.42" filter="url(#softGlow)">
    <animate attributeName="stroke-dasharray" values="0,2200;2200,0" dur="13s" repeatCount="indefinite"></animate>
  </path>

  <!-- Center destiny seal -->
  <g transform="translate(700 128)">
    <circle r="82" fill="url(#goldCore)" filter="url(#bigGlow)"></circle>
    <circle r="78" fill="none" stroke="#f8df8e" stroke-opacity="0.75" stroke-width="2.6"></circle>
    <circle r="62" fill="none" stroke="#7ea8ff" stroke-opacity="0.32" stroke-width="1.4"></circle>
    <circle r="48" fill="none" stroke="#d2a0ff" stroke-opacity="0.26" stroke-width="1.2"></circle>

    <!-- 12 zodiac ticks -->
    <g stroke="#f4df9a" stroke-opacity="0.8" stroke-width="2">
      <line x1="0" y1="-78" x2="0" y2="-66"></line>
      <line x1="39" y1="-68" x2="33" y2="-58"></line>
      <line x1="68" y1="-39" x2="58" y2="-33"></line>
      <line x1="78" y1="0" x2="66" y2="0"></line>
      <line x1="68" y1="39" x2="58" y2="33"></line>
      <line x1="39" y1="68" x2="33" y2="58"></line>
      <line x1="0" y1="78" x2="0" y2="66"></line>
      <line x1="-39" y1="68" x2="-33" y2="58"></line>
      <line x1="-68" y1="39" x2="-58" y2="33"></line>
      <line x1="-78" y1="0" x2="-66" y2="0"></line>
      <line x1="-68" y1="-39" x2="-58" y2="-33"></line>
      <line x1="-39" y1="-68" x2="-33" y2="-58"></line>
    </g>

    <!-- Numerology triangle -->
    <polygon points="0,-34 30,22 -30,22" fill="none" stroke="#fff3c4" stroke-opacity="0.9" stroke-width="2.2" filter="url(#softGlow)"></polygon>
    <circle cx="0" cy="-12" r="7" fill="#ffd96c" opacity="0.9"></circle>
    <circle cx="-16" cy="16" r="5" fill="#9dc1ff" opacity="0.8"></circle>
    <circle cx="16" cy="16" r="5" fill="#d6a7ff" opacity="0.8"></circle>

    <!-- Subtle pulse -->
    <circle r="88" fill="none" stroke="#f0c85c" stroke-opacity="0.16" stroke-width="3">
      <animate attributeName="r" values="82;92;82" dur="5.5s" repeatCount="indefinite"></animate>
      <animate attributeName="stroke-opacity" values="0.08;0.24;0.08" dur="5.5s" repeatCount="indefinite"></animate>
    </circle>
  </g>

  <!-- Chinese element side glyphs -->
  <g opacity="0.6" filter="url(#softGlow)" font-family="Georgia, serif" font-size="24" fill="#f3d37a">
    <text x="170" y="104">木</text>
    <text x="206" y="128">火</text>
    <text x="170" y="152">土</text>
    <text x="206" y="176">金</text>
    <text x="170" y="200">水</text>

    <text x="1198" y="104">水</text>
    <text x="1234" y="128">金</text>
    <text x="1198" y="152">土</text>
    <text x="1234" y="176">火</text>
    <text x="1198" y="200">木</text>
  </g>

  <!-- Small moon / sun medallions -->
  <g filter="url(#softGlow)">
    <circle cx="304" cy="82" r="18" fill="#ffd667" opacity="0.9"></circle>
    <circle cx="1096" cy="82" r="18" fill="#9dbdff" opacity="0.85"></circle>
    <circle cx="1103" cy="78" r="14" fill="#11142a"></circle>
  </g>

  <!-- Title -->
  <text x="50%" y="78%" text-anchor="middle" fill="url(#titleGrad)" font-size="56" font-family="Cinzel, Georgia, 'Times New Roman', serif" font-weight="700" letter-spacing="5" filter="url(#softGlow)">
    DESTINY CALC
    <animate attributeName="opacity" values="0.86;1;0.86" dur="4s" repeatCount="indefinite"></animate>
  </text>

  <!-- Subtitle -->
  <text x="50%" y="89%" text-anchor="middle" fill="url(#subGrad)" font-size="16" font-family="Inter, 'Segoe UI', sans-serif" letter-spacing="3" opacity="0.92">
    ZODIAC • CHINESE ELEMENTS • NUMEROLOGY • INSTALLABLE PWA
  </text>
</svg>